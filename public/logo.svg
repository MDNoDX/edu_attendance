<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- head / cap band: a clean rounded dome sitting under the mortarboard,
       its top edge cut to a shallow "V" so it reads as tucked under the
       flat top instead of floating separately -->
  <path
    d="M58 66 L58 104 C58 127 76 145 100 145 C124 145 142 127 142 104 L142 66 L100 88 Z"
    fill="#3730A3"
  />
  <!-- mortarboard: a single flat, crisp rhombus — no inner notch or seam,
       reads cleanly even at 24-32px sidebar sizes -->
  <path
    d="M100 16 L190 60 C194 62 194 66 190 68 L100 112 C99 112.5 97.5 112.5 97 112 L7 68 C3 66 3 62 7 60 L97 16 C97.5 15.5 99 15.5 100 16 Z"
    fill="#4F46E5"
  />
  <!-- tassel: one smooth cord ending in a simple dot, no separate blob shape -->
  <path
    d="M167 53 C184 63 190 82 181 99"
    stroke="#A5B4FC"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="180" cy="108" r="9" fill="#A5B4FC"/>
</svg>
